name: Daily ChangeLog Scrape

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      release_limit:
        description: 'Number of releases to fetch per repository'
        required: false
        default: '5'
        type: string

permissions:
  contents: write  # Required to commit and push changes

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        
    - name: Install uv
      uses: astral-sh/setup-uv@v2
      
    - name: Install dependencies
      run: uv sync
      
    - name: Run ChangeLog Radar scrape
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LIMIT="${{ github.event.inputs.release_limit || '5' }}"
        uv run python main.py scrape --limit "$LIMIT" --output index.yaml
        
    - name: Check if index.yaml changed
      id: verify-changed-files
      run: |
        if git diff --quiet HEAD -- index.yaml; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Deploy to GitHub Pages
      if: steps.verify-changed-files.outputs.changed == 'true'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        publish_branch: gh-pages
        
    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.yaml
        git commit -m "chore: update release index ($(date -u '+%Y-%m-%d %H:%M:%S UTC'))"
        git push
        
    - name: Upload index.yaml as artifact
      uses: actions/upload-artifact@v3
      with:
        name: release-index
        path: index.yaml
        retention-days: 30